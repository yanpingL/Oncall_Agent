services:
  backend:
    build:
      context: .
    image: oncall-agent-backend:local
    container_name: oncall-agent-backend
    environment:
      APP_NAME: ${APP_NAME:-SuperBizAgent}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 9900
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      RAG_MODEL: ${RAG_MODEL:-gpt-5.4-nano}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-max}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v4}
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      MILVUS_TIMEOUT: ${MILVUS_TIMEOUT:-10000}
      MILVUS_CONNECT_ON_STARTUP: ${MILVUS_CONNECT_ON_STARTUP:-true}
      RAG_TOP_K: ${RAG_TOP_K:-3}
      CHUNK_MAX_SIZE: ${CHUNK_MAX_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
      MCP_CLS_TRANSPORT: streamable-http
      MCP_CLS_URL: http://cls-mcp:8003/mcp
      MCP_MONITOR_TRANSPORT: streamable-http
      MCP_MONITOR_URL: http://monitor-mcp:8004/mcp
      PROMETHEUS_BASE_URL: http://prometheus:9090
      PROMETHEUS_AUTH_TYPE: none
      PROMETHEUS_REQUEST_TIMEOUT: ${PROMETHEUS_REQUEST_TIMEOUT:-10.0}
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 9900
    ports:
      - "9900:9900"
    depends_on:
      standalone:
        condition: service_healthy
      cls-mcp:
        condition: service_started
      monitor-mcp:
        condition: service_started
      prometheus:
        condition: service_healthy

  cls-mcp:
    image: oncall-agent-backend:local
    container_name: oncall-agent-cls-mcp
    environment:
      AWS_REGION: ${AWS_REGION:-ap-southeast-2}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-2}
      CLS_MODE: ${CLS_MODE:-demo}
      CLS_DEMO_LOGS_PATH: ${CLS_DEMO_LOGS_PATH:-demo-data/cls_logs.json}
    command: python mcp_servers/cls_server.py
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8003), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 12

  monitor-mcp:
    image: oncall-agent-backend:local
    container_name: oncall-agent-monitor-mcp
    environment:
      PROMETHEUS_BASE_URL: http://prometheus:9090
      PROMETHEUS_AUTH_TYPE: none
      PROMETHEUS_REQUEST_TIMEOUT: ${PROMETHEUS_REQUEST_TIMEOUT:-10.0}
    command: python mcp_servers/monitor_server.py
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8004), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      prometheus:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: oncall-agent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-demo/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-demo/alerts.yml:/etc/prometheus/alerts.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
