groups:
  - name: showcase-alerts
    rules:
      - alert: ShowcaseServiceDegraded
        expr: vector(1)
        labels:
          severity: warning
          service: data-sync-service
          namespace: demo
          pod: data-sync-service-demo
        annotations:
          summary: "Demo service degradation alert"
          description: "This showcase alert is generated by local Prometheus so the AIOps agent can query real alert data."
