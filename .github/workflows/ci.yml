name: CI

on:
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "agent/**"
      - ".github/workflows/**"

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint with Ruff (non-blocking baseline)
        run: python -m ruff check app mcp_servers || true

      - name: Type-check with mypy (non-blocking baseline)
        run: python -m mypy app --ignore-missing-imports || true

      - name: Compile Python sources
        run: python -m compileall app mcp_servers

      - name: Run tests when present
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            echo "No tests directory found; skipping pytest."
          fi

      - name: Build Docker image
        run: docker build -t oncall-agent-backend:ci .
